version: '3.8'
services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: automotriz
      MYSQL_ROOT_PASSWORD: tecsup_password
    ports:
      - "3307:3306"

  app:
    build: .
    ports:
      - "9000:9000"
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASS: tecsup_password
      DB_NAME: automotriz